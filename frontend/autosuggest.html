<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity</title>
</head>
<body>
    <div class="container">
        <div class="icons-row">
            <span class="gear-icon">&#9881;</span>
            <span class="status-icons">&#8226; online | &#9202; ms</span>
        </div>

        <main style="text-align: center;">
            <h1>
                <span class="being">Being</span><span class="infinity">Infinity</span>
            </h1>
            <p>One million phrases. Four algorithms. Prefix-based auto suggest.</p>
            
            <div id="search-box-container" class="search-box">
                <span class="search-icon">&#128270;</span>
                <input id="search-input" type="text" placeholder="Start typing to search...">
            </div>
            <div id="suggestions-container" class="suggestions-box"></div>
        </main>
    </div>

    <style>
        body {
            margin: 0;
        }
        .container {
            padding: 20px;
        }
        .icons-row {
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-between;
        }
        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 2.5em;
            line-height: 1.2;
            letter-spacing: 0.05em;
        }
        p {
            text-align: center;
            margin: 0 0 30px 0;
            font-size: 1em;
            line-height: 1.4; 
        }
        .search-box {
            position: relative;
            width: 40%;
            margin: 20px auto 0 auto;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            font-size: 14px;
            color: #666;
            pointer-events: none;
        }
        .suggestions-box {
            display: none;
            margin: 20px auto 0 auto;
            padding: 20px;
            border: 1px solid black;
            border-radius: 5px;
            min-height: 10px;
            text-align: center;
            width: 40%;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }
        .suggestions-box:hover {
            display: block;
        }ayout cluster area */
        .search-box:hover + .suggestions-box {
            display: block;
        }
        input {
            width: 100%;
            height: 38px;
            border-radius: 20px;
            border: 1px solid black;
            padding: 0 10px 0 35px;
            box-sizing: border-box;
        }
        .being {
            color: #007BFF; 
        }
        .infinity {
            color: black; 
        }
    </style>
</body>
</html>
