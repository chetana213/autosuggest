<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity</title>
</head>
<body>
    <div class="container">
        <div class="icons-row">
            <span class="gear-icon">&#9881;</span>
            <span class="status-icons">&#8226; online | <span id="ping-value">&#9202;</span> ms</span>
        </div>

        <main style="text-align: center;">
            <h1>
                <span class="being">Being</span><span class="infinity">Infinity</span>
            </h1>
            <p>One million phrases. Four algorithms. Prefix-based auto suggest.</p>
            
            <div id="search-box-container" class="search-box">
                <span class="search-icon">&#128270;</span>
                <input id="search-input" type="text" placeholder="Start typing to search...">
            </div>
            <div id="suggestions-container" class="suggestions-box"></div>
        </main>
    </div>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            padding: 20px;
        }
        .icons-row {
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-between;
        }
        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 2.5em;
            line-height: 1.2;
            letter-spacing: 0.05em;
        }
        p {
            text-align: center;
            margin: 0 0 30px 0;
            font-size: 1em;
            line-height: 1.4; 
        }
        .search-box {
            position: relative;
            width: 40%;
            margin: 20px auto 0 auto;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            font-size: 14px;
            color: #666;
            pointer-events: none;
        }
        .suggestions-box {
            margin: 4px auto 0 auto; /* Reduced from 20px to 4px to pull it close to the input */
            padding: 10px 0; /* Clean listing look */
            border: 1px solid black;
            border-radius: 8px; /* Standard tidy rounded corners */
            min-height: 10px;
            text-align: left; /* Tidy auto-suggest look */
            width: 40%;
            box-sizing: border-box;
            background-color: #f9f9f9;
            display: none; /* Managed completely by script matching character presence */
        }
        .suggestions-box div {
            padding: 8px 15px;
            cursor: pointer;
        }
        .suggestions-box div:hover {
            background-color: #e5e5e5;
        }
        input {
            width: 100%;
            height: 38px;
            border-radius: 20px;
            border: 1px solid black;
            padding: 0 10px 0 35px;
            box-sizing: border-box;
        }
        .being {
            color: #007BFF; 
        }
        .infinity {
            color: black; 
        }
    </style>

    <script>
        // Target the actual text input element rather than the container wrapper
        var searchInput = document.getElementById('search-input');
        var suggestionsBox = document.getElementById('suggestions-container');

        searchInput.addEventListener('input', function() {
            var userText = searchInput.value;

            // Proper check for empty input or strings containing only spaces
            if (userText.trim() === "") {
                suggestionsBox.style.display = 'none';
                suggestionsBox.innerHTML = "";
                return;
            }

            // Cleaned URL construction with your variables matching user input value
            var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
            var url3 = "&algorithm=brute&limit=10&weighted=false";
            var url = url1 + encodeURIComponent(userText) + url3;

            fetch(url)
                .then(function(response) {
                    return response.json(); // First and only json conversion required
                })
                .then(function(data) {
                    console.log(data);
                    
                    // Checked your expected array object naming conventions safely 
                    var resultsArray = data.results || []; 
                    
                    if (resultsArray.length === 0) {
                        suggestionsBox.style.display = 'none';
                        return;
                    }

                    var htmlResults = "";
                    for (var i = 0; i < resultsArray.length; i++) {
                        // Safely rendering strings or fallback strings depending on return shape
                        var textValue = resultsArray[i].text || resultsArray[i];
                        htmlResults += "<div>" + textValue + "</div>";
                    }

                    // Display results and unhide the elements immediately
                    suggestionsBox.innerHTML = htmlResults;
                    suggestionsBox.style.display = 'block';
                })
                .catch(function(error) {
                    console.error("Error fetching suggestions:", error);
                });
        });
    </script>
</body>
</html>
